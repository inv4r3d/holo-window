<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Off-axis Hologram: Coral</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #webcam-container {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 120px;
            height: 90px;
            border: 2px solid #00ff88;
            border-radius: 8px;
            overflow: hidden;
            transform: scaleX(-1);
            background: #222;
            opacity: 0.2;
            z-index: 10;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff88;
            font-size: 18px;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            line-height: 1.5;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="status">Загрузка нейросети камеры...</div>

<div id="webcam-container">
    <video id="webcam" autoplay playsinline></video>
</div>

<script type="module">
    import * as THREE from 'three';
    import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';

    let targetX = 0, targetY = 0, targetZ = 0.5;
    let SCREEN_WIDTH = 0.345;
    let SCREEN_HEIGHT = 0.215;

    function updateScreenBounds() {
        const aspect = window.innerWidth / window.innerHeight;
        if (aspect > 1) { 
            SCREEN_HEIGHT = 0.22;
            SCREEN_WIDTH = SCREEN_HEIGHT * aspect;
        } else { 
            SCREEN_WIDTH = 0.15; 
            SCREEN_HEIGHT = SCREEN_WIDTH / aspect;
        }
    }
    updateScreenBounds();

    const statusEl = document.getElementById('status');

    // === 1. ИНИЦИАЛИЗАЦИЯ THREE.JS ===
    const scene = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);

    // Коробка-аквариум
    const roomGeometry = new THREE.BoxGeometry(SCREEN_WIDTH, SCREEN_HEIGHT, 0.6); 
    const roomMaterial = new THREE.MeshBasicMaterial({ color: 0x050a10, side: THREE.BackSide }); // Сделали фон чуть более глубоким синим под морскую тематику
    const room = new THREE.Mesh(roomGeometry, roomMaterial);
    room.position.set(0, 0, -0.3); 
    scene.add(room);

    const gridHelper = new THREE.BoxHelper(room, 0x003355);
    scene.add(gridHelper);

    // === 2. ЗАГРУЗКА PLY ФАЙЛА (КОРАЛЛ) ===
    let pointCloudMesh = null;
    const loader = new PLYLoader();

    statusEl.innerText = "Загрузка 3D модели коралла...";

    loader.load('coral.ply', function (geometry) {
        
        const positionAttr = geometry.getAttribute('position');
        const colorAttr = geometry.getAttribute('color');
        
        // ОПТИМИЗАЦИЯ: Если файл тяжелый, поменяй 1 на 2, 3 или 5.
        const stride = 1; 
        const newCount = Math.floor(positionAttr.count / stride);
        
        const optimizedGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(newCount * 3);
        const colors = new Float32Array(newCount * 3);
        
        let targetIndex = 0;
        for (let i = 0; i < positionAttr.count; i += stride) {
            positions[targetIndex * 3]     = positionAttr.getX(i);
            positions[targetIndex * 3 + 1] = positionAttr.getY(i);
            positions[targetIndex * 3 + 2] = positionAttr.getZ(i);
            
            if (colorAttr) {
                colors[targetIndex * 3]     = colorAttr.getX(i);
                colors[targetIndex * 3 + 1] = colorAttr.getY(i);
                colors[targetIndex * 3 + 2] = colorAttr.getZ(i);
            }
            targetIndex++;
        }
        
        optimizedGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        if (colorAttr) {
            optimizedGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        }

        const material = new THREE.PointsMaterial({ 
            size: 0.003, // Сделали точки чуть меньше для изящности коралла
            vertexColors: true,
            transparent: true,
            opacity: 0.95
        });

        pointCloudMesh = new THREE.Points(optimizedGeometry, material);

        // Центрируем модель
        optimizedGeometry.computeBoundingBox();
        const center = new THREE.Vector3();
        optimizedGeometry.boundingBox.getCenter(center);
        pointCloudMesh.position.sub(center); // Сначала сдвигаем саму модель в её нулевую координату

        // Создаем контейнер, чтобы было удобнее крутить и двигать центрированный объект
        const coralContainer = new THREE.Group();
        coralContainer.add(pointCloudMesh);

        // Масштабируем по самому большому измерению (чтобы гарантированно влез в коробку)
        const size = new THREE.Vector3();
        optimizedGeometry.boundingBox.getSize(size);
        const maxDimension = Math.max(size.x, size.y, size.z);
        const scaleFactor = (SCREEN_HEIGHT * 0.7) / maxDimension; // Занимает 70% высоты экрана
        coralContainer.scale.setScalar(scaleFactor);

        // Позиционируем контейнер с кораллом внутри нашего виртуального аквариума
        coralContainer.position.z = -0.2; // Чуть ближе к переднему стеклу
        // coralContainer.rotation.x = Math.PI / 8; // Раскомментируй и покрути, если он загрузился боком

        scene.add(coralContainer);
        statusEl.style.display = 'none';
        
        geometry.dispose();
        
        // Сохраним ссылку на контейнер для анимации (если нужно)
        window.coralMesh = coralContainer; 
        
    }, function (xhr) {
        if (xhr.total > 0) {
            const percent = Math.round((xhr.loaded / xhr.total) * 100);
            statusEl.innerText = `Загрузка коралла: ${percent}%`;
        }
    }, function (error) {
        console.error(error);
        statusEl.innerText = "Ошибка загрузки coral.ply";
    });


    // === 3. МАТРИЦА OFF-AXIS ===
    function updateOffAxisProjection(cam, x, y, z) {
        const near = 0.01;
        const far = 10;
        const left   = near * (-SCREEN_WIDTH / 2 - x) / z;
        const right  = near * (SCREEN_WIDTH / 2 - x) / z;
        const bottom = near * (-SCREEN_HEIGHT / 2 - y) / z;
        const top    = near * (SCREEN_HEIGHT / 2 - y) / z;

        cam.projectionMatrix.makePerspective(left, right, top, bottom, near, far);
        cam.position.set(x, y, z);
        cam.rotation.set(0, 0, 0);
    }

    // === 4. ТРЕКИНГ ЛИЦА ===
    const videoElement = document.getElementById('webcam');

    function onResults(results) {
        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            const landmarks = results.multiFaceLandmarks[0];
            const bridgeOfNose = landmarks[168];

            targetX = -(bridgeOfNose.x - 0.5) * 0.5; 
            targetY = -(bridgeOfNose.y - 0.5) * 0.4;
            targetZ = 0.35 + (bridgeOfNose.z * -1.2);
            if (targetZ < 0.15) targetZ = 0.15;
        }
    }

    const faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });
    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });
    faceMesh.onResults(onResults);

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({ image: videoElement }); },
        width: { ideal: 640 },
        height: { ideal: 480 },
        facingMode: 'user' 
    });
    cameraUtils.start();


    // === 5. РЕНДЕР-ЦИКЛ ===
    let currentX = 0, currentY = 0, currentZ = 0.5;

    function animate() {
        requestAnimationFrame(animate);

        // Легкое вращение коралла, чтобы разглядеть его со всех сторон (опционально)
        if (window.coralMesh) {
            window.coralMesh.rotation.y += 0.002; 
        }

        currentX += (targetX - currentX) * 0.15;
        currentY += (targetY - currentY) * 0.15;
        currentZ += (targetZ - currentZ) * 0.15;

        updateOffAxisProjection(camera, currentX, currentY, currentZ);
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        updateScreenBounds();
        room.geometry.dispose();
        room.geometry = new THREE.BoxGeometry(SCREEN_WIDTH, SCREEN_HEIGHT, 0.6);
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
