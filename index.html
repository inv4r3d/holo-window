<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Off-axis Hologram (Mobile Ready)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            touch-action: none; /* Отключаем стандартные жесты */
        }
        canvas {
            display: block;
        }
        #webcam-container {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 120px;
            height: 90px;
            border: 2px solid #00ff88;
            border-radius: 8px;
            overflow: hidden;
            transform: scaleX(-1);
            background: #222;
            opacity: 0.2;
            z-index: 10;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff88;
            font-size: 18px;
            text-align: center;
            pointer-events: none;
            z-index: 20;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="loading">Загрузка нейросети...<br><small style="color:#aaa;">Разрешите доступ к камере</small></div>

<div id="webcam-container">
    <video id="webcam" autoplay playsinline></video>
</div>

<script type="module">
    import * as THREE from 'three';

    let targetX = 0, targetY = 0, targetZ = 0.5;
    
    // Базовые физические размеры (для смартфона они меньше, но оставим средние, чтобы работало везде)
    let SCREEN_WIDTH = 0.345;
    let SCREEN_HEIGHT = 0.215;

    // Адаптируем виртуальное окно под пропорции текущего экрана устройства
    function updateScreenBounds() {
        const aspect = window.innerWidth / window.innerHeight;
        if (aspect > 1) { // Альбомная (ПК или перевернутый телефон)
            SCREEN_HEIGHT = 0.22;
            SCREEN_WIDTH = SCREEN_HEIGHT * aspect;
        } else { // Портретная (Смартфон вертикально)
            SCREEN_WIDTH = 0.15; // ~15 см ширина экрана телефона
            SCREEN_HEIGHT = SCREEN_WIDTH / aspect;
        }
    }
    updateScreenBounds();

    const loadingEl = document.getElementById('loading');

    // Сцена
    const scene = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);

    // Комната
    const roomGeometry = new THREE.BoxGeometry(SCREEN_WIDTH, SCREEN_HEIGHT, 0.4); 
    const roomMaterial = new THREE.MeshStandardMaterial({ color: 0x0a0a0f, side: THREE.BackSide, roughness: 0.7 });
    const room = new THREE.Mesh(roomGeometry, roomMaterial);
    room.position.set(0, 0, -0.2); 
    room.receiveShadow = true;
    scene.add(room);

    const gridHelper = new THREE.BoxHelper(room, 0x00ff88);
    scene.add(gridHelper);

    // Предметы
    const tableGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.05, 32);
    const tableMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const table = new THREE.Mesh(tableGeo, tableMat);
    table.position.set(0, -SCREEN_HEIGHT/2 + 0.025, -0.15);
    table.castShadow = true;
    scene.add(table);

    const pillGeo = new THREE.CapsuleGeometry(0.008, 0.015, 8, 16);
    const pillMat = new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.2 });
    const pill = new THREE.Mesh(pillGeo, pillMat);
    pill.position.set(0, -SCREEN_HEIGHT/2 + 0.06, -0.15);
    pill.rotation.z = Math.PI / 3;
    pill.castShadow = true;
    scene.add(pill);

    // Свет
    scene.add(new THREE.AmbientLight(0xffffff, 0.1));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(0, SCREEN_HEIGHT/2, -0.05);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const redLight = new THREE.PointLight(0xff0055, 3, 0.4);
    redLight.position.set(-SCREEN_WIDTH/2, 0, -0.15);
    scene.add(redLight);

    const blueLight = new THREE.PointLight(0x0088ff, 3, 0.4);
    blueLight.position.set(SCREEN_WIDTH/2, 0, -0.15);
    scene.add(blueLight);

    // Матрица проекции
    function updateOffAxisProjection(cam, x, y, z) {
        const near = 0.01;
        const far = 10;
        const left   = near * (-SCREEN_WIDTH / 2 - x) / z;
        const right  = near * (SCREEN_WIDTH / 2 - x) / z;
        const bottom = near * (-SCREEN_HEIGHT / 2 - y) / z;
        const top    = near * (SCREEN_HEIGHT / 2 - y) / z;

        cam.projectionMatrix.makePerspective(left, right, top, bottom, near, far);
        cam.position.set(x, y, z);
        cam.rotation.set(0, 0, 0);
    }

    // Трекинг
    const videoElement = document.getElementById('webcam');

    function onResults(results) {
        if (loadingEl.style.display !== 'none') loadingEl.style.display = 'none';

        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            const landmarks = results.multiFaceLandmarks[0];
            const bridgeOfNose = landmarks[168];

            // Коэффициенты для плавного трекинга
            targetX = -(bridgeOfNose.x - 0.5) * 0.5; 
            targetY = -(bridgeOfNose.y - 0.5) * 0.4;
            targetZ = 0.3 + (bridgeOfNose.z * -1.2);
            if (targetZ < 0.15) targetZ = 0.15;
        }
    }

    const faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });
    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: false, // Отключаем детализацию губ ради производительности на смартфонах
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });
    faceMesh.onResults(onResults);

    // Принудительно запрашиваем СЕЛФИ-камеру (facingMode: 'user')
    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({ image: videoElement }); },
        width: { ideal: 640 },
        height: { ideal: 480 },
        facingMode: 'user' 
    });
    cameraUtils.start();

    // Рендер-цикл
    let currentX = 0, currentY = 0, currentZ = 0.5;

    function animate() {
        requestAnimationFrame(animate);
        pill.rotation.y += 0.01;

        currentX += (targetX - currentX) * 0.15;
        currentY += (targetY - currentY) * 0.15;
        currentZ += (targetZ - currentZ) * 0.15;

        updateOffAxisProjection(camera, currentX, currentY, currentZ);
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        updateScreenBounds();
        // Пересоздаем геометрию комнаты под новые пропорции экрана телефона
        room.geometry.dispose();
        room.geometry = new THREE.BoxGeometry(SCREEN_WIDTH, SCREEN_HEIGHT, 0.4);
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
